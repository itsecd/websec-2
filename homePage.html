<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToSamara</title>
  <script src="https://cdn.maptiler.com/maplibre-gl-js/v2.4.0/maplibre-gl.js"></script>
  <script type="text/javascript" src="script.js"></script>
  <link href="https://cdn.maptiler.com/maplibre-gl-js/v2.4.0/maplibre-gl.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.5.0/css/font-awesome.min.css">
  <link href="styles.css" rel="stylesheet">
</head>
<body>
  <section>
    <div class="header" id="header">
      <div class="logo_text" style="display: flex;" >
        <img alt="ToSamaraLogo" style="display:block; text-align:center" class="logo" src="tosamara.jpg" />
        <p style="vertical-align:middle;">
          <span style="display:block; text-align:center">ТРАНСПОРНЫЙ</span>
          <span style="display:block; text-align:center">ОПЕРАТОР</span>
          <span style="display:block; text-align:center">САМАРЫ</span>
        </p>
      </div>
      <div class="phone">
        <span class="hotline" style="display:block; text-align:center">Горячая линия (07:30 - 19:30, Пн-Вс)</span>
        <span class="number" style="display:block; text-align:center">+7 (846) 207-70-11</span>
      </div>

      <div class="search">
        <form>
          <input type="text" placeholder="Поиск...">
          <button type="submit"></button>
        </form>
      </div>
    </div>
  </section>
  
  <section class="stop-info">
    <h1>Здесь будет будущее</h1>
  </section>

  <section class="sec-map">
    <div class="map-context">
      <h2>Положение остановки</h2>
    </div>
    <div id="map"></div>
  </section>
  
  <script>
      const key = 'SFtVbCiiP1MkvkPZNfSu';
      const map = new maplibregl.Map({
        container: 'map', // container id
        style: `https://api.maptiler.com/maps/streets/style.json?key=${key}`, // style URL
        center: [50.29644, 53.23704], // starting position [lng, lat]
        zoom: 10, // starting zoom
      });
      map.addControl(new maplibregl.NavigationControl(), 'top-right');

      var monument = [50.29644, 53.23704];
// create the popup
      var popup = new maplibregl.Popup({ offset: 25 }).setText(
      'Construction on the Washington Monument began in 1848.'
      );
      
      // create DOM element for the marker
      var el = document.createElement('div');
      el.id = 'marker';
      
      // create the marker
      new maplibregl.Marker(el)
      .setLngLat(monument)
      .setPopup(popup) // sets a popup on this marker
      .addTo(map);



      //var marker = map.marker([50.29644, 53.23704])
  </script>
</body>
</html>
